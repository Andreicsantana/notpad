
<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Notes App</title>
		<style>
			:root {
				--bg: #f4f6fb;
				--card: #ffffff;
				--text: #1f2937;
				--muted: #6b7280;
				--primary: #1d4ed8;
				--primary-hover: #1e40af;
				--danger: #dc2626;
				--danger-hover: #b91c1c;
				--border: #e5e7eb;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: var(--text);
				background: radial-gradient(circle at top left, #eef2ff 0%, var(--bg) 45%);
			}

			.container {
				width: min(900px, 92vw);
				margin: 40px auto;
				background: var(--card);
				border: 1px solid var(--border);
				border-radius: 16px;
				box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
				overflow: hidden;
			}

			.header {
				padding: 24px;
				border-bottom: 1px solid var(--border);
			}

			.header h1 {
				margin: 0;
				font-size: 1.6rem;
			}

			.composer {
				padding: 20px 24px;
				display: grid;
				gap: 12px;
				border-bottom: 1px solid var(--border);
			}

			.composer textarea {
				width: 100%;
				min-height: 110px;
				padding: 12px;
				border: 1px solid var(--border);
				border-radius: 10px;
				font-size: 1rem;
				resize: vertical;
			}

			.composer button {
				width: fit-content;
				padding: 10px 18px;
				border: none;
				border-radius: 10px;
				background: var(--primary);
				color: white;
				font-weight: 600;
				cursor: pointer;
			}

			.composer button:hover {
				background: var(--primary-hover);
			}

			.notes {
				list-style: none;
				margin: 0;
				padding: 16px 24px 24px;
				display: grid;
				gap: 12px;
			}

			.note-item {
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 14px;
				display: grid;
				gap: 10px;
				background: #fbfdff;
			}

			.note-content {
				margin: 0;
				white-space: pre-wrap;
				word-break: break-word;
			}

			.note-actions {
				display: flex;
				gap: 8px;
			}

			.note-actions button {
				padding: 8px 12px;
				border: none;
				border-radius: 8px;
				color: white;
				font-weight: 600;
				cursor: pointer;
			}

			.edit-btn {
				background: var(--primary);
			}

			.edit-btn:hover {
				background: var(--primary-hover);
			}

			.delete-btn {
				background: var(--danger);
			}

			.delete-btn:hover {
				background: var(--danger-hover);
			}

			.empty {
				color: var(--muted);
				text-align: center;
				padding: 8px 0 2px;
			}

			@media (max-width: 640px) {
				.container {
					margin: 18px auto;
				}

				.header,
				.composer,
				.notes {
					padding-left: 14px;
					padding-right: 14px;
				}
			}
		</style>
	</head>
	<body>
		<main class="container">
			<header class="header">
				<h1>Notes App</h1>
			</header>

			<section class="composer">
				<label for="note-input">Nova nota</label>
				<textarea
					id="note-input"
					placeholder="Digite o conteúdo da sua nota..."
				></textarea>
				<button id="add-note-btn" type="button">Adicionar</button>
			</section>

			<ul id="notes-list" class="notes"></ul>
		</main>

		<script src="./scripts/storageNote.js"></script>
		<script src="./scripts/createNote.js"></script>
		<script src="./scripts/deleteNote.js"></script>
		<script src="./scripts/updateNote.js"></script>

		<script>
			const noteInput = document.getElementById("note-input");
			const addNoteButton = document.getElementById("add-note-btn");
			const notesList = document.getElementById("notes-list");

			let notes = loadNotesFromStorage();

			function persistAndRender(updatedNotes) {
				notes = updatedNotes;
				saveNotesToStorage(notes);
				renderNotes();
			}

			function handleAddNote() {
				const nextNotes = createNote(notes, noteInput.value);

				if (nextNotes === notes) {
					return;
				}

				persistAndRender(nextNotes);
				noteInput.value = "";
				noteInput.focus();
			}

			function handleDeleteNote(noteId) {
				const nextNotes = deleteNote(notes, noteId);
				persistAndRender(nextNotes);
			}

			function handleUpdateNote(noteId, currentContent) {
				const editedContent = prompt("Edite o conteúdo da nota:", currentContent);

				if (editedContent === null) {
					return;
				}

				const nextNotes = updateNote(notes, noteId, editedContent);

				if (nextNotes === notes) {
					return;
				}

				persistAndRender(nextNotes);
			}

			function renderNotes() {
				notesList.innerHTML = "";

				if (!notes.length) {
					const emptyItem = document.createElement("li");
					emptyItem.className = "empty";
					emptyItem.textContent = "Nenhuma nota cadastrada ainda.";
					notesList.appendChild(emptyItem);
					return;
				}

				notes.forEach((note) => {
					const noteItem = document.createElement("li");
					noteItem.className = "note-item";

					const content = document.createElement("p");
					content.className = "note-content";
					content.textContent = note.content;

					const actions = document.createElement("div");
					actions.className = "note-actions";

					const editButton = document.createElement("button");
					editButton.type = "button";
					editButton.className = "edit-btn";
					editButton.textContent = "Editar";
					editButton.addEventListener("click", () => {
						handleUpdateNote(note.id, note.content);
					});

					const deleteButton = document.createElement("button");
					deleteButton.type = "button";
					deleteButton.className = "delete-btn";
					deleteButton.textContent = "Deletar";
					deleteButton.addEventListener("click", () => {
						handleDeleteNote(note.id);
					});

					actions.appendChild(editButton);
					actions.appendChild(deleteButton);

					noteItem.appendChild(content);
					noteItem.appendChild(actions);

					notesList.appendChild(noteItem);
				});
			}

			addNoteButton.addEventListener("click", handleAddNote);

			noteInput.addEventListener("keydown", (event) => {
				if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
					handleAddNote();
				}
			});

			renderNotes();


			window.renderNotes = renderNotes;
		</script>
	</body>
</html>
