
<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Not a Notes App</title>
		<style>
			:root {
				--bg: #e8e8e8;
				--text: #1f2937;
				--postit-yellow: #ffd93d;
				--postit-pink: #ff6b9d;
				--postit-blue: #6bcf7f;
				--postit-green: #a1e3d8;
				--postit-orange: #ffb347;
				--postit-purple: #d4a5ff;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: "Comic Sans MS", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				color: var(--text);
				background: linear-gradient(135deg, #d4d4d4 0%, #e8e8e8 50%, #d0d0d0 100%);
				background-attachment: fixed;
				min-height: 100vh;
			}

			.container {
				width: min(1200px, 95vw);
				margin: 40px auto;
				background: linear-gradient(135deg, #c0c0c0 0%, #d8d8d8 50%, #c8c8c8 100%);
				border: 8px inset #a0a0a0;
				border-radius: 8px;
				box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), inset 0 -2px 4px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.15);
				padding: 24px;
			}

			.header {
				padding: 0 0 24px 0;
				border-bottom: none;
				text-align: center;
			}

			.header h1 {
				margin: 0;
				font-size: 2rem;
				font-weight: 800;
				color: #333;
				text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
			}

			.composer {
				display: none;
			}

			.notes {
				list-style: none;
				margin: 0;
				padding: 0;
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
				gap: 20px;
				align-items: start;
			}

			.note-item {
				border: none;
				border-radius: 4px;
				padding: 16px;
				display: grid;
				gap: 12px;
				background: var(--postit-yellow);
				box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2), -2px 2px 4px rgba(0, 0, 0, 0.1);
				transform: rotate(-2deg) translateZ(0);
				transition: transform 0.2s ease, box-shadow 0.2s ease;
				height: fit-content;
				min-height: 200px;
				grid-auto-rows: auto;
			}

			.note-item:nth-child(2n) {
				background: var(--postit-pink);
				transform: rotate(1.5deg) translateZ(0);
			}

			.note-item:nth-child(3n) {
				background: var(--postit-blue);
				transform: rotate(-1deg) translateZ(0);
			}

			.note-item:nth-child(4n) {
				background: var(--postit-green);
				transform: rotate(1.8deg) translateZ(0);
			}

			.note-item:nth-child(5n) {
				background: var(--postit-orange);
				transform: rotate(-1.5deg) translateZ(0);
			}

			.note-item:nth-child(6n) {
				background: var(--postit-purple);
				transform: rotate(0.8deg) translateZ(0);
			}

			.note-item:hover {
				transform: rotate(0deg) scale(1.02) translateZ(0);
				box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
			}

			.note-title {
				margin: 0 0 8px 0;
				font-size: 1.1rem;
				font-weight: 700;
				word-break: break-word;
			}

			.note-content {
				margin: 0;
				white-space: pre-wrap;
				word-break: break-word;
				font-size: 0.9rem;
				line-height: 1.4;
				flex: 1;
			}

			.note-actions {
				display: flex;
				gap: 6px;
				margin-top: auto;
			}

			.note-actions button {
				padding: 6px 10px;
				border: none;
				border-radius: 4px;
				color: white;
				font-weight: 600;
				cursor: pointer;
				font-size: 0.8rem;
				flex: 1;
			}

			.edit-btn {
				background: rgba(0, 0, 0, 0.3);
			}

			.edit-btn:hover {
				background: rgba(0, 0, 0, 0.5);
			}

			.delete-btn {
				background: rgba(200, 0, 0, 0.4);
			}

			.delete-btn:hover {
				background: rgba(200, 0, 0, 0.7);
			}

			.empty {
				display: none;
			}

			.add-note-postit {
				border: 3px dashed rgba(0, 0, 0, 0.3);
				border-radius: 4px;
				padding: 16px;
				background: rgba(255, 255, 255, 0.4);
				box-shadow: none;
				transform: rotate(0deg) translateZ(0);
				display: grid;
				place-items: center;
				cursor: pointer;
				min-height: 200px;
				height: 100%;
				transition: all 0.2s ease;
			}

			.add-note-postit:hover {
				background: rgba(255, 255, 255, 0.6);
				transform: scale(1.02);
			}

			.add-note-icon {
				font-size: 3.5rem;
				color: rgba(0, 0, 0, 0.4);
			}

			@media (max-width: 768px) {
				.container {
					margin: 20px auto;
					padding: 16px;
					border-width: 6px;
				}

				.notes {
					grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
					gap: 16px;
				}

				.note-item {
					min-height: 160px;
					padding: 12px;
				}
			}

			@media (max-width: 480px) {
				.container {
					margin: 10px auto;
					padding: 12px;
				}

				.notes {
					grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
					gap: 12px;
				}

				.note-item {
					min-height: 140px;
				}
			}

			/* Modal Styles */
			.modal-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: rgba(0, 0, 0, 0.5);
				z-index: 1000;
				place-items: center;
			}

			.modal-overlay.active {
				display: grid;
			}

			.modal-dialog {
				background: var(--postit-yellow);
				border-radius: 4px;
				padding: 24px;
				box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), -4px 4px 8px rgba(0, 0, 0, 0.2);
				transform: rotate(-1deg);
				width: min(400px, 90vw);
				display: grid;
				gap: 16px;
				animation: modalPop 0.3s ease;
			}

			@keyframes modalPop {
				0% {
					transform: rotate(-1deg) scale(0.8);
					opacity: 0;
				}
				100% {
					transform: rotate(-1deg) scale(1);
					opacity: 1;
				}
			}

			.modal-dialog.pink {
				background: var(--postit-pink);
			}

			.modal-dialog.blue {
				background: var(--postit-blue);
			}

			.modal-dialog.green {
				background: var(--postit-green);
			}

			.modal-dialog.orange {
				background: var(--postit-orange);
			}

			.modal-dialog.purple {
				background: var(--postit-purple);
			}

			.modal-title {
				font-size: 1.3rem;
				font-weight: 700;
				margin: 0;
				text-align: center;
			}

			.modal-field {
				display: grid;
				gap: 6px;
			}

			.modal-field label {
				font-weight: 600;
				font-size: 0.95rem;
			}

			.modal-field input,
			.modal-field textarea {
				padding: 10px;
				border: 2px solid rgba(0, 0, 0, 0.2);
				border-radius: 4px;
				font-family: inherit;
				font-size: 0.95rem;
				background: rgba(255, 255, 255, 0.7);
			}

			.modal-field input:focus,
			.modal-field textarea:focus {
				outline: none;
				border-color: rgba(0, 0, 0, 0.5);
				background: rgba(255, 255, 255, 0.95);
			}

			.modal-field textarea {
				min-height: 120px;
				resize: vertical;
			}

			.modal-actions {
				display: flex;
				gap: 10px;
				margin-top: 8px;
			}

			.modal-btn {
				flex: 1;
				padding: 12px 16px;
				border: none;
				border-radius: 4px;
				font-weight: 600;
				cursor: pointer;
				font-size: 0.95rem;
				transition: all 0.2s ease;
			}

			.modal-btn-ok {
				background: rgba(0, 0, 0, 0.3);
				color: white;
			}

			.modal-btn-ok:hover {
				background: rgba(0, 0, 0, 0.5);
				transform: translateY(-2px);
			}

			.modal-btn-cancel {
				background: rgba(255, 255, 255, 0.5);
				color: rgba(0, 0, 0, 0.7);
			}

			.modal-btn-cancel:hover {
				background: rgba(255, 255, 255, 0.8);
				transform: translateY(-2px);
			}
		</style>
	</head>
	<body>
		<main class="container">
			<header class="header">
				<h1>📌 Notas</h1>
			</header>

			<section class="composer">
				<label for="note-title-input">Titulo</label>
				<input
					id="note-title-input"
					type="text"
					placeholder="Digite o titulo da nota..."
				/>
				<label for="note-input">Texto da nota</label>
				<textarea
					id="note-input"
					placeholder="Digite o conteúdo da sua nota..."
				></textarea>
				<button id="add-note-btn" type="button">Adicionar</button>
			</section>

			<ul id="notes-list" class="notes"></ul>
		</main>

		<div id="modal-overlay" class="modal-overlay">
			<div id="modal-dialog" class="modal-dialog">
				<h2 id="modal-title" class="modal-title">Nova Nota</h2>
				
				<div class="modal-field">
					<label for="modal-title-input">Título</label>
					<input 
						id="modal-title-input" 
						type="text" 
						placeholder="Digite o título da nota..."
						autocomplete="off"
					/>
				</div>

				<div class="modal-field">
					<label for="modal-content-input">Conteúdo</label>
					<textarea 
						id="modal-content-input" 
						placeholder="Digite o conteúdo da nota..."
					></textarea>
				</div>

				<div class="modal-actions">
					<button type="button" class="modal-btn modal-btn-cancel" id="modal-cancel-btn">Cancelar</button>
					<button type="button" class="modal-btn modal-btn-ok" id="modal-ok-btn">Adicionar</button>
				</div>
			</div>
		</div>

		<script src="./scripts/storageNote.js"></script>
		<script src="./scripts/createNote.js"></script>
		<script src="./scripts/deleteNote.js"></script>
		<script src="./scripts/updateNote.js"></script>

		<script>
			const noteTitleInput = document.getElementById("note-title-input");
			const noteInput = document.getElementById("note-input");
			const addNoteButton = document.getElementById("add-note-btn");
			const notesList = document.getElementById("notes-list");

			const modalOverlay = document.getElementById("modal-overlay");
			const modalDialog = document.getElementById("modal-dialog");
			const modalTitle = document.getElementById("modal-title");
			const modalTitleInput = document.getElementById("modal-title-input");
			const modalContentInput = document.getElementById("modal-content-input");
			const modalOkBtn = document.getElementById("modal-ok-btn");
			const modalCancelBtn = document.getElementById("modal-cancel-btn");

			let notes = loadNotesFromStorage();
			let currentEditingNoteId = null;
			const colors = ["yellow", "pink", "blue", "green", "orange", "purple"];

			function persistAndRender(updatedNotes) {
				notes = updatedNotes;
				saveNotesToStorage(notes);
				renderNotes();
			}

			function getRandomColor() {
				return colors[Math.floor(Math.random() * colors.length)];
			}

			function openModal(title = "Nova Nota", currentTitle = "", currentContent = "", noteId = null) {
				currentEditingNoteId = noteId;
				modalTitle.textContent = title;
				modalTitleInput.value = currentTitle;
				modalContentInput.value = currentContent;
				modalOkBtn.textContent = noteId ? "Salvar" : "Adicionar";

				// Remover todas as classes de cor
				colors.forEach(color => modalDialog.classList.remove(color));
				// Adicionar cor aleatória
				modalDialog.classList.add(getRandomColor());

				modalOverlay.classList.add("active");
				modalTitleInput.focus();
			}

			function closeModal() {
				modalOverlay.classList.remove("active");
				currentEditingNoteId = null;
				modalTitleInput.value = "";
				modalContentInput.value = "";
			}

			function handleModalOk() {
				const title = modalTitleInput.value;
				const content = modalContentInput.value;

				if (currentEditingNoteId) {
					const nextNotes = updateNote(notes, currentEditingNoteId, title, content);
					if (nextNotes !== notes) {
						persistAndRender(nextNotes);
					}
				} else {
					const nextNotes = createNote(notes, title, content);
					if (nextNotes !== notes) {
						persistAndRender(nextNotes);
					}
				}

				closeModal();
			}

			
			modalOkBtn.addEventListener("click", handleModalOk);
			modalCancelBtn.addEventListener("click", closeModal);

			
			document.addEventListener("keydown", (event) => {
				if (event.key === "Escape" && modalOverlay.classList.contains("active")) {
					closeModal();
				}
			});

			
			modalOverlay.addEventListener("click", (event) => {
				if (event.target === modalOverlay) {
					closeModal();
				}
			});

			
			modalContentInput.addEventListener("keydown", (event) => {
				if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
					handleModalOk();
				}
			});

			function handleAddNote() {
				const nextNotes = createNote(notes, noteTitleInput.value, noteInput.value);

				if (nextNotes === notes) {
					return;
				}

				persistAndRender(nextNotes);
				noteTitleInput.value = "";
				noteInput.value = "";
				noteTitleInput.focus();
			}

			function handleDeleteNote(noteId) {
				const nextNotes = deleteNote(notes, noteId);
				persistAndRender(nextNotes);
			}

			function handleUpdateNote(noteId, currentTitle, currentContent) {
				openModal("Editar Nota", currentTitle, currentContent, noteId);
			}

			function renderNotes() {
				notesList.innerHTML = "";

				const addNoteItem = document.createElement("li");
				addNoteItem.className = "add-note-postit";
				addNoteItem.innerHTML = '<div class="add-note-icon">+</div>';
				addNoteItem.addEventListener("click", () => {
					openModal();
				});
				notesList.appendChild(addNoteItem);

				if (!notes.length) {
					return;
				}

				notes.forEach((note) => {
					const noteItem = document.createElement("li");
					noteItem.className = "note-item";

					const title = document.createElement("h2");
					title.className = "note-title";
					title.textContent = note.title || "Sem titulo";

					const content = document.createElement("p");
					content.className = "note-content";
					content.textContent = note.content;

					const actions = document.createElement("div");
					actions.className = "note-actions";

					const editButton = document.createElement("button");
					editButton.type = "button";
					editButton.className = "edit-btn";
					editButton.textContent = "✏️ Editar";
					editButton.addEventListener("click", () => {
						handleUpdateNote(note.id, note.title || "", note.content);
					});

					const deleteButton = document.createElement("button");
					deleteButton.type = "button";
					deleteButton.className = "delete-btn";
					deleteButton.textContent = "🗑️ Deletar";
					deleteButton.addEventListener("click", () => {
						handleDeleteNote(note.id);
					});

					actions.appendChild(editButton);
					actions.appendChild(deleteButton);

					noteItem.appendChild(title);
					noteItem.appendChild(content);
					noteItem.appendChild(actions);

					notesList.appendChild(noteItem);
				});
			}

			addNoteButton.addEventListener("click", handleAddNote);

			noteInput.addEventListener("keydown", (event) => {
				if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
					handleAddNote();
				}
			});

			renderNotes();

			window.renderNotes = renderNotes;
		</script>
	</body>
</html>
